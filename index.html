<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Wedding Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card" id="card">

    <!-- COMBINED WEDDING BUTTON -->
    <a href="https://maps.app.goo.gl/iG7y59KC2WTmziNTA" target="_blank" class="button combined-btn" id="wedBtn">
      <span class="btn-text">WEDDING</span>
      <span class="btn-text">Venue</span>
    </a>

    <!-- COMBINED RECEPTION BUTTON -->
    <a href="https://maps.app.goo.gl/4SgQrND5e6kxksRu7" target="_blank" class="button combined-btn" id="recBtn">
      <span class="btn-text">RECEPTION</span>
      <span class="btn-text">Venue</span>
    </a>

    <!-- LANGUAGE BUTTONS -->
    <div class="language-buttons">
      <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">English</button>
      <button class="lang-btn" id="btn-hi" onclick="setLanguage('hi')">हिंदी</button>
      <button class="lang-btn" id="btn-te" onclick="setLanguage('te')">తెలుగు</button>
    </div>

    <!-- MUSIC -->
    <audio id="bgMusic" autoplay loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <div class="music-btn" onclick="toggleMusic()">🔊</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
