<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wedding Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="content">
      <!-- Main invitation text -->
      <div class="title">శ్రీరస్తు! శుభమస్తు!</div>
      <div class="subtitle">వివాహ మహోత్సవ ఆహ్వాన పత్రిక</div>
      <div class="names">శోభ పటేల్ ❤️ వినయ్ పటేల్ </div>

      <!-- Marriage button -->
      <a href="https://maps.app.goo.gl/oa5Da75WWH1oTDBK6" target="_blank" rel="noopener" class="event-button">
        <div class="event-name">Marriage</div>
        <div class="event-date">12 April 2026</div>
      </a>

      <!-- Reception button -->
      <a href="https://maps.app.goo.gl/d1ZwPbyaSUf2XzyV8" target="_blank" rel="noopener" class="event-button">
        <div class="event-name">Reception</div>
        <div class="event-date">14 April 2026</div>
      </a>

      <!-- Language selection buttons -->
      <div class="language-buttons">
        <a href="hindi.html" class="lang-btn">हिंदी</a>
        <a href="english.html" class="lang-btn">English</a>
      </div>
    </div>
  </div>
</body>
</html>
